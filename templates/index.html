{% extends 'base.html' %}

{% block title %} Geo History {% endblock %}

{% block content %}
<h1 class="text-center">Georgian historical information</h1>
<div class="row">
    {% for year in years %}
    <div class="col-md-4 mb-4 d-flex align-items-stretch">
        <div class="card shadow-sm">
            <img src="/static/images/{{ year['img'] }}" class="card-img-top" style="height: 250px; object-fit: cover;" alt="{{ year['GEO_history'] }}">
            <div class="card-body d-flex flex-column">
                <h5 class="card-title">{{ year["GEO_history"] }}</h5>
                <p class="card-text">{{ year["name"] }}</p>
                <a href="/years/{{ year['id'] }}" class="btn btn-primary mt-auto">See Details</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
